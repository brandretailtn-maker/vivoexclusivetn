<!DOCTYPE html>
<html>
<head>
<title>Vivo Exclusive TN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: linear-gradient(90deg, #0b1f3a, #1a73e8);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.navbar nav a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-weight: 500;
    transition: 0.3s;
}

.navbar nav a:hover {
    color: #25D366;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(120deg, #1a73e8, #0b1f3a);
    color: white;
}

.hero h1 {
    font-size: 42px;
}

.hero p {
    margin: 10px 0;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    background: #25D366;
    color: white;
    padding: 12px 25px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

/* SECTION */
.section {
    max-width: 1100px;
    margin: 40px auto;
    padding: 30px;
    background: white;
    border-radius: 12px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.08);
    text-align: center;
}

/* PRODUCTS */
.products {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 250px;
    padding: 20px;
    border-radius: 12px;
    background: white;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
}

/* FOOTER */
.footer {
    background: #0b1f3a;
    color: white;
    padding: 20px;
    text-align: center;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
    }
    .navbar nav {
        margin-top: 10px;
    }
}
</style>
</head>
    

<body>

</header>

</div>

</a>

</div>

<div class="section">

<div class="footer">
    © 2026 Vivo Exclusive Stores
